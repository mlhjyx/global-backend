openapi: 3.1.0
info:
  title: Global API
  version: 0.1.0
  description: |
    出海企业 AI 全球客户开发与增长平台 · 后端 API。
    契约先行：前端以本契约（及其 Mock）对接。约定与错误模型见 packages/contracts/README.md。
  contact:
    name: Global Backend
servers:
  - url: /api/v1
    description: Versioned base path
security:
  - bearerAuth: []
tags:
  - name: System
    description: 健康检查等系统端点
  - name: Companies
    description: 企业理解 —— CompanyProfile / Offering / Claim（PRD 7.2，AI 获客 P1）

paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: 健康检查
      description: 返回服务存活状态与时间戳；无需鉴权，用于探活与就绪检查。
      security: []
      responses:
        "200":
          description: 服务存活
          content:
            application/json:
              schema:
                type: object
                required: [status, service, ts]
                properties:
                  status: { type: string, examples: [ok] }
                  service: { type: string, examples: [global-api] }
                  ts: { type: string, format: date-time }

  /companies:
    get:
      tags: [Companies]
      operationId: listCompanies
      summary: 列出当前 workspace 的企业画像
      description: 游标分页返回当前 workspace（由 token 确定）下的企业画像列表。
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: 一页企业画像
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Companies]
      operationId: createCompany
      summary: 提交官网，触发企业理解（异步）
      description: 提交企业官网 URL，后台异步抓取解析、抽取企业/产品/能力候选并生成知识审核任务；立即返回 DRAFT 画像。
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCompanyRequest" }
      responses:
        "202":
          description: 已受理，后台开始解析与抽取
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyProfile" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /companies/{companyId}:
    get:
      tags: [Companies]
      operationId: getCompany
      summary: 按 id 获取企业画像
      description: 返回单个企业画像及其成熟度状态；跨 workspace 访问由 RLS 阻断，返回 404。
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: 企业画像
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompanyProfile" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 外部 SaaS 平台签发的 workspace-scoped token；后端仅校验并解出上下文。

  parameters:
    Limit:
      name: limit
      in: query
      description: 每页条数
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      description: 游标分页令牌
      schema: { type: string }
    CompanyId:
      name: companyId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 写副作用幂等键（PRD 11.16）
      schema: { type: string }

  responses:
    BadRequest:
      description: 请求校验失败
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: 缺失或无效 token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, examples: [INVALID_SCHEMA] }
            message: { type: string }
            details: { type: object, additionalProperties: true }
    Page:
      type: object
      required: [next_cursor, has_more]
      properties:
        next_cursor: { type: [string, "null"] }
        has_more: { type: boolean }
    CompanyProfile:
      type: object
      required: [id, name, status, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, examples: ["Shenzhen Acme Tech Co."] }
        website: { type: [string, "null"], format: uri }
        status:
          type: string
          enum: [DRAFT, ENRICHING, ACTIVE]
          description: 画像成熟度；ACTIVE 表示达到可创建 Campaign 的最低阈值
        created_at: { type: string, format: date-time }
    CompanyList:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/CompanyProfile" }
        page: { $ref: "#/components/schemas/Page" }
    CreateCompanyRequest:
      type: object
      required: [website]
      properties:
        website: { type: string, format: uri, examples: ["https://acme-tech.com"] }

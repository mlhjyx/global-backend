# gitleaks 配置：默认规则集 + 针对性 allowlist。只放行**已知公开**的 RX/Algolia 前端配置。
title = "Global backend gitleaks"

[extend]
useDefault = true

# 全局 allowlist（singular，条件 OR）：命中任一即放行。
[allowlist]
description = """
RX/Algolia public fair configs：展会模板/适配器/dev 脚本只承载前端公开暴露的
public search-only key + 公开 index/eventEdition id + 展会 slug，设计上就是公开、非密钥。
EU FSF 制裁名单 token：EU 官方**固定公开** token（=base64 "token-2017"），由 EU 自家 RSS 公布供公开程序化访问，非密钥（制裁筛查第五门）。
"""
paths = [
  '''apps/api/src/discovery/trade-fairs\.ts''',
  '''apps/api/src/adapters/trade-fair-algolia\.ts''',
  '''apps/api/scripts/acq-multi-country\.mts''',
  '''apps/api/scripts/discover-fair-algolia\.mjs''',
]
# site-renderer fixtures 的 crew.mN.<field> 与六个 M1-e-B Family 的稳定文案路径是
# SiteSpec i18n key（非 token、非凭证，已核验）。精确放行这些 key 模式而非整目录，
# 保留对未来真实 secret 的扫描。
# 兜底：这些公开串出现在任何文件都放行（RX 共用 public key + 展会 slug + EU FSF 公开 token）
regexes = [
  '''d5cd7d4ec26134ff4a34d736a7f9ad47''',
  '''interphex-2026''',
  '''dG9rZW4tMjAxNw''',
  # site-renderer fixture 的 crew.mN.<field> 是 SiteSpec i18n key（非 token、非凭证，已核验），精确放行该模式
  '''crew\.[a-z0-9]+\.[a-z]+''',
  # M1-e-B Golden 只生成 home/detail.<section>.<semantic-field> 稳定 CopySlot 路径。
  '''(?:home|detail)\.[a-z0-9-]+\.(?:[a-z0-9]+\.)*[a-z0-9]+''',
]

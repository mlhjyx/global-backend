<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Precision industrial abstract technical field</title>
  <desc id="desc">Original abstract grid, measurement lines, and industrial material planes.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07111d"/>
      <stop offset="1" stop-color="#1e3a4f"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#7ec6d8" stroke-opacity=".25"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#surface)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <path d="M140 690 720 210l560 280-580 300Z" fill="#7ec6d8" fill-opacity=".18" stroke="#bdeefa" stroke-width="4"/>
  <path d="M720 210v480M140 690h1140" stroke="#bdeefa" stroke-opacity=".55" stroke-width="3"/>
  <circle cx="720" cy="210" r="18" fill="#f5c968"/>
</svg>

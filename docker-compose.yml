# Local dev infrastructure for the Global backend.
# Temporal is added in P1 when the first durable workflow lands.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: global-postgres
    environment:
      POSTGRES_USER: global
      POSTGRES_PASSWORD: global
      POSTGRES_DB: global_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U global -d global_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: global-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Model aggregation gateway (中转站). Manage models/channels/keys/quotas in its
  # Web UI at http://localhost:3001 — the app calls only its one OpenAI-compatible
  # endpoint (http://localhost:3001/v1). First-run admin: root / 123456.
  new-api:
    image: calciumion/new-api:latest
    container_name: global-new-api
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - newapi-data:/data

  # Crawler (PRD §10.18: Crawl4AI, self-hosted). Isolated container (ADR-013);
  # the worker calls its REST API behind the WebCrawlerProvider adapter.
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: global-crawl4ai
    restart: unless-stopped
    ports:
      - "11235:11235"
    shm_size: "1g" # Chromium shared memory
    environment:
      - CRAWL4AI_API_TOKEN=global-local-crawl-token # enables external access + auth
      # DEV ONLY: Docker Desktop (macOS) resolves public hosts to 198.18.x.x
      # (non-global), which Crawl4AI's SSRF guard blocks. Prod Linux resolves
      # real public IPs, so keep SSRF on there — do NOT set this in prod.
      - CRAWL4AI_ALLOW_INTERNAL_URLS=true

  # Self-hosted meta-search (discovery entry point for public intelligence).
  # Server-to-server only — never expose beyond localhost (limiter is off).
  searxng:
    image: searxng/searxng:latest
    container_name: global-searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./infra/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/

volumes:
  pgdata:
  redisdata:
  newapi-data:

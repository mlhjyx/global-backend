# Local dev infrastructure for the Global backend.
# Temporal is added in P1 when the first durable workflow lands.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: global-postgres
    environment:
      POSTGRES_USER: global
      POSTGRES_PASSWORD: global
      POSTGRES_DB: global_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U global -d global_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: global-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:

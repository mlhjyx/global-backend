# Local dev infrastructure for the Global backend.
# Temporal intentionally runs outside Compose via `temporal-dev.service`.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: global-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: global
      POSTGRES_PASSWORD: global
      POSTGRES_DB: global_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U global -d global_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: global-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Model aggregation gateway (中转站). Manage models/channels/keys/quotas in its
  # Web UI at http://localhost:3001 — the app calls only its one OpenAI-compatible
  # endpoint (http://localhost:3001/v1). First-run admin: root / 123456.
  new-api:
    image: calciumion/new-api:latest
    container_name: global-new-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - newapi-data:/data

  # Crawler (PRD §10.18: Crawl4AI, self-hosted). Isolated container (ADR-013);
  # the worker calls its REST API behind the WebCrawlerProvider adapter.
  # Built from a thin dev wrapper (infra/crawl4ai/Dockerfile) that only disables
  # the image's bundled cache-Redis persistence — see that file for the why.
  crawl4ai:
    build:
      context: ./infra/crawl4ai
    image: global-crawl4ai:local # local tag for the patched wrapper build
    container_name: global-crawl4ai
    restart: unless-stopped
    ports:
      - "127.0.0.1:11235:11235"
    shm_size: "1g" # Chromium shared memory
    environment:
      - CRAWL4AI_API_TOKEN=global-local-crawl-token # enables external access + auth
      # Ubuntu mihomo 将公网 DNS 映射到 RFC 2544 198.18/15。仅在全部系统答案都属于
      # 该段时用固定 DoH 取真实答案，随后仍由 Crawl4AI 的 global-IP 守卫 + pinning
      # proxy 逐连接校验；绝不启用 CRAWL4AI_ALLOW_INTERNAL_URLS。
      - CRAWL4AI_FAKEIP_DOH_FALLBACK=true

  # Object storage for site-builder assets and KB objects (docs/site-builder/02 §2).
  # Renderer Release artifacts are still local: as-built; do not conflate them.
  # Tenant isolation = key prefix ws/{workspace_id}/… + presigned URLs; bucket is
  # never public. Console at http://localhost:9001 (dev creds below, dev only).
  minio:
    image: minio/minio:latest
    container_name: global-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Web console (dev only)
    environment:
      MINIO_ROOT_USER: global
      MINIO_ROOT_PASSWORD: global-minio-dev # dev only — never reuse in prod
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted embeddings for the knowledge base (docs/site-builder/02 D14:
  # BGE-M3, 1024-dim, 100+ languages; company data never leaves the host).
  # CPU-only is fine for KB-sized batches. First boot pulls the model (~1.2GB)
  # into the volume — healthcheck only goes green once the model is present.
  # Ollama exposes an OpenAI-compatible upstream at :11434. Application traffic
  # goes through the bge-m3 channel in new-api (:3001/v1/embeddings); the host
  # port remains loopback-only for health checks and bounded diagnostics.
  embeddings:
    image: ollama/ollama:latest
    container_name: global-embeddings
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & sleep 3 && ollama pull bge-m3 && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama ls | grep -q bge-m3"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s

  # Document parsing for the knowledge base (docs/site-builder/02 §12: Docling —
  # layout-aware PDF/DOCX/PPTX → markdown, tables preserved). Current dev runs
  # unprivileged but retains egress because first convert downloads layout models;
  # production target pre-bakes models and disables network (06 §2).
  docling:
    image: ghcr.io/docling-project/docling-serve:latest
    container_name: global-docling
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=0

  # Self-hosted meta-search (discovery entry point for public intelligence).
  # Server-to-server only — never expose beyond localhost (limiter is off).
  searxng:
    image: searxng/searxng:latest
    container_name: global-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./infra/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/

volumes:
  pgdata:
  redisdata:
  newapi-data:
  miniodata:
  ollamadata:

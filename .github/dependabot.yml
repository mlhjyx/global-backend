version: 2
# 依赖自动更新（团队后端安全基线）。npm 生态覆盖 pnpm-lock.yaml。
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # 次要/补丁版聚合成一个 PR，减少噪声；主要版单独 PR 便于评审破坏性变更
      minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
